name: LUMI safety

on:
  push:
  pull_request:

jobs:
  safety-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run safety and certification tests
        run: python -m unittest discover -s tests -p 'test_*.py'
